<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>灵山剑侠录 · 第一章</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #14121c; color: #e8e2d5; font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
         display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 12px; }
  #wrap { position: relative; width: min(960px, 100%); }
  canvas { width: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges;
           border: 2px solid #3a3148; border-radius: 6px; background: #0d0b14; touch-action: none; }
  .ovl { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
         justify-content: center; gap: 14px; }
  #title { background: rgba(13,11,20,0.35); border-radius: 6px; }
  #title h1 { font-family: "KaiTi", "STKaiti", "DFKai-SB", serif; font-size: clamp(40px, 9vw, 76px);
              color: #f3e6c8; letter-spacing: 0.18em; text-shadow: 0 3px 0 #5a2c1d, 0 0 24px rgba(255,210,106,0.35); }
  #title .sub { font-size: 14px; color: #c9b98f; letter-spacing: 0.5em; margin-top: -6px; }
  .gbtn { font-family: inherit; font-size: 16px; padding: 10px 34px; cursor: pointer;
          background: #241e33; color: #f3e6c8; border: 1px solid #8a6d3b; border-radius: 4px; letter-spacing: 0.3em; }
  .gbtn:hover { background: #322a47; }
  .gbtn:disabled { opacity: 0.4; cursor: default; }
  #dlg { position: absolute; left: 3%; right: 3%; bottom: 4%; background: rgba(16,13,26,0.92);
         border: 1px solid #8a6d3b; border-radius: 6px; padding: 12px 16px; cursor: pointer;
         font-size: clamp(14px, 2.4vw, 17px); line-height: 1.7; display: none; }
  #dlgName { display: none; background: #8a6d3b; color: #16121f; font-size: 12px; padding: 1px 10px;
             border-radius: 3px; margin-right: 8px; vertical-align: 2px; }
  #dlg .cue { color: #8d8470; font-size: 12px; float: right; margin-top: 6px; }
  #panel { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
           background: rgba(8,6,12,0.55); }
  #panelBody { background: #1c1729; border: 1px solid #8a6d3b; border-radius: 8px; padding: 18px 20px;
               width: min(420px, 92%); max-height: 88%; overflow-y: auto; }
  #panelBody h3 { font-family: "KaiTi", "STKaiti", serif; color: #ffd76a; font-size: 20px; margin-bottom: 10px; letter-spacing: 0.2em; }
  #panelBody .gold { color: #c9b98f; font-size: 13px; margin-bottom: 10px; }
  .srow { display: flex; justify-content: space-between; align-items: center; gap: 10px;
          border-bottom: 1px solid #322a47; padding: 9px 2px; font-size: 14px; }
  .srow span { display: block; color: #9a917e; font-size: 12px; margin-top: 2px; }
  .pbtn { font-family: inherit; font-size: 13px; padding: 7px 14px; cursor: pointer; white-space: nowrap;
          background: #241e33; color: #f3e6c8; border: 1px solid #8a6d3b; border-radius: 4px; margin-top: 8px; }
  .pbtn:hover { background: #322a47; }
  #toast { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); background: rgba(16,13,26,0.92);
           border: 1px solid #8a6d3b; border-radius: 4px; padding: 6px 18px; font-size: 14px; display: none; }
  #endov { background: rgba(10,8,16,0.88); display: none; text-align: center; padding: 20px; }

         margin-top: 10px; gap: 10px; flex-wrap: wrap; }

  #dpad button, #btl button { font-family: inherit; font-size: 15px; cursor: pointer; background: #241e33;
         color: #f3e6c8; border: 1px solid #574a73; border-radius: 6px; }
  #dpad button:active, #btl button:active { background: #3d3357; }
  #btl { display: none; gap: 8px; flex: 1; flex-wrap: wrap; }
  #btl button { flex: 1; min-width: 76px; padding: 12px 6px; border-color: #8a6d3b; }
  #btl button:disabled { opacity: 0.4; }

  #menubar button { font-family: inherit; font-size: 13px; padding: 10px 14px; cursor: pointer;
         background: #1c1729; color: #c9b98f; border: 1px solid #574a73; border-radius: 6px; }
  #hint { width: min(960px, 100%); color: #6e6655; font-size: 12px; margin-top: 10px; line-height: 1.8; }
</style>
</head>

<div id="wrap">
  <canvas id="cv" width="960" height="640"></canvas>

    <div class="sub">第一章 · 锁妖塔</div>

  <div id="panel"><div id="panelBody"></div></div>
  <div id="endov" class="ovl">
    <h2 id="endTitle">第一章 · 完</h2>
    <p id="endText"></p>
    <div style="display:flex;gap:12px;">
      <button id="btnRoam" class="gbtn">继续游历</button>
      <button id="btnRestart" class="gbtn">重新开始</button>
    </div>
  </div>
  <div id="toast"></div>
</div>

</div>

// ===== 地图层:瓦片地图生成 + MAPS 注册表 + NPC 配置 =====
// 瓦片字符:G 草 t 深草 T 树 W 水 P 路 b 桥 R 屋顶 H 墙 X 石墙 F 石地
//          e 符纹遇敌地 D 门(锁妖塔/水府) d 木门(进屋) O 出口 S 灵泉 B 封印
//          第二章:V 漩涡(湖面入口) a 湖水 c 水草(遇敌) Z 蛟龙王座
function blank(w,h,f){const m=[];for(let y=0;y<h;y++)m.push(new Array(w).fill(f));return m;}
function fillR(m,x,y,w,h,c){for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++){if(m[j]&&m[j][i]!==undefined)m[j][i]=c;}}
function house(m,x,y){fillR(m,x,y,5,2,'R');fillR(m,x,y+2,5,2,'H');}
function makeWorld(){
  const w=64,h=48,m=blank(w,h,'G');
  for(let k=0;k<150;k++){
    const x=2+Math.floor(srnd()*(w-4)),y=2+Math.floor(srnd()*(h-4));
    if(y>=33)continue;if(y>=11&&y<=17)continue;if(x>=28&&x<=35)continue;
    m[y][x]='T';
  }
  fillR(m,1,13,w-2,2,'W');
  fillR(m,8,5,8,5,'t');fillR(m,46,4,9,5,'t');fillR(m,12,26,8,5,'t');
  fillR(m,44,24,9,6,'t');fillR(m,38,18,7,4,'t');fillR(m,16,18,6,4,'t');
  fillR(m,5,20,8,5,'W');m[22][15]='S';
  fillR(m,31,3,2,42,'P');
  fillR(m,31,13,2,2,'b');
  fillR(m,28,0,8,3,'X');fillR(m,31,2,2,1,'D');
  fillR(m,4,35,56,12,'G');
  fillR(m,31,35,2,10,'P');fillR(m,10,42,44,2,'P');
  house(m,9,37);house(m,19,37);house(m,41,37);house(m,51,37);
  m[40][11]='d';m[40][21]='d';m[40][43]='d';m[40][53]='d';
  m[14][24]='V'; // 第二章:湖面漩涡(降妖王后由阿萝点醒才显现,见 canWalk/onStep 的 ch2 判定)
  fillR(m,0,0,w,1,'T');fillR(m,0,h-1,w,1,'T');fillR(m,0,0,1,h,'T');fillR(m,w-1,0,1,h,'T');
  return m;
}

  fillR(m,6,5,3,2,'R');fillR(m,19,5,3,2,'R');

}

'use strict';
// ===== 战斗层:回合制战斗状态机 + 战斗绘制 =====
let B=null;
function battleUI(on){
  $('btl').style.display=on?'flex':'none';
  $('dpad').style.display=on?'none':'grid';
  refreshBtns();
}
function refreshBtns(){
  const en=mode==='battle'&&B&&B.phase==='cmd';
  ['batk','bskl','bitm','bfle'].forEach(id=>{$(id).disabled=!en;});
}
function startBattle(key,boss){
  const d=ENM[key];
  const hp=d.hp+(boss?0:S.lvl*4);
  B={
    e:{name:d.n,el:d.el,hp:hp,maxHp:hp,atk:d.atk+(boss?0:Math.floor(S.lvl/2)),exp:d.exp,gold:d.gold,draw:d.draw,s:d.s,gw:d.gw||16,caster:d.caster},
    key:key,boss:!!boss,phase:'cmd',hOx:0,eOx:0,fE:0,fH:0,shake:0,pops:[],anim:null,timer:0,turn:0,msg:d.n+' 出现了!'
  };
  mode='battle';grace=2;battleUI(true);
  tone(90,0.3,'sawtooth',0.07,40);
}
function bmsg(t){if(B)B.msg=t;}
function pop(x,y,txt,c){if(B)B.pops.push({x:x,y:y,txt:txt,c:c,t:0});}
function advMult(a,d){if(a==='无')return 1;if(CK[a]===d)return 1.5;if(CK[d]===a)return 0.7;return 1;}
function dealE(d,c){
  B.e.hp-=d;B.fE=0.18;B.shake=0.22;
  pop(330,220,'-'+d,c||'#fff');sHit();
}
function afterPlayer(){
  if(B.e.hp<=0){winB();return;}
  B.phase='wait';B.timer=0.55;refreshBtns();
}
function act(a){
  if(!B||B.phase!=='cmd')return;
  au();
  if(a==='atk'){B.phase='anim';B.anim={k:'lunge',t:0};sSwing();}
  else if(a==='skl')openSkillMenu();
  else if(a==='itm')openItemMenu();
  else if(a==='fle'){
    if(!B.boss&&Math.random()<0.6){mode='world';B=null;battleUI(false);return;}
    bmsg(B.boss?'强敌挡路,无法逃跑!':'逃跑失败!');
    B.phase='wait';B.timer=0.5;
  }
  refreshBtns();
}
function openSkillMenu(){
  let h='<h3>仙术</h3><div class="gold">灵力:'+S.mp+' / '+S.maxMp+'</div>';
  SKILLS.forEach((s,i)=>{
    if(skillKnown(s))h+='<div class="srow"><div><b style="color:'+ELC[s.el]+'">'+s.n+'</b><span>'+s.el+'系 · 威力×'+s.mult+'</span></div><button class="pbtn" onclick="castSkill('+i+')">'+s.mp+' 灵力</button></div>';
  });
  h+='<button class="pbtn" onclick="closePanel()">返回</button>';
  openPanel(h);
}
function castSkill(i){
  closePanel();
  if(!B||B.phase!=='cmd')return;
  const sk=SKILLS[i];
  if(S.mp<sk.mp){bmsg('灵力不足!');return;}
  S.mp-=sk.mp;
  B.phase='anim';B.anim={k:'proj',x:640,t:0,sk:sk};sCast();
  refreshBtns();
}
function openItemMenu(){
  let h='<h3>物品</h3>';
  h+='<div class="srow"><div><b>回灵丹 ×'+INV.dan+'</b><span>恢复 45 气血</span></div><button class="pbtn" onclick="useItem(\'dan\')">使用</button></div>';

  h+='<div class="srow"><div><b>清心散 ×'+INV.qing+'</b><span>恢复 30 灵力</span></div><button class="pbtn" onclick="useItem(\'qing\')">使用</button></div>';
  h+='<button class="pbtn" onclick="closePanel()">返回</button>';

}
function useItem(k){
  if(!B||B.phase!=='cmd')return;
  if(INV[k]<1){toast('没有了……');return;}
  closePanel();
  INV[k]--;
  if(k==='dan'){const h=Math.min(45,S.maxHp-S.hp);S.hp+=h;pop(700,320,'+'+h,'#7CFC9A');bmsg('服下回灵丹。');}
  else if(k==='dadan'){const h=S.maxHp-S.hp;S.hp=S.maxHp;pop(700,320,'+'+h,'#7CFC9A');bmsg('大还丹入腹,气血全满!');}
  else{const m=Math.min(30,S.maxMp-S.mp);S.mp+=m;pop(700,320,'+'+m+' 灵力','#bfa7ff');bmsg('服下清心散。');}
  sHeal();
  B.phase='wait';B.timer=0.55;refreshBtns();
}
function enemyAct(){
  B.turn++;
  if(B.e.caster&&B.turn%2===0){B.anim={k:'espell',t:0};sCast();}
  else B.anim={k:'elunge',t:0};
  B.phase='anim';
}
function hurtHero(base){
  const d=Math.max(1,base-defP());
  S.hp-=d;B.fH=0.18;B.shake=0.22;
  pop(740,280,'-'+d,'#ff6b6b');sHurt();
}
function winB(){
  B.phase='over';refreshBtns();sWin();
  bmsg('击败了 '+B.e.name+'!');
  S.gold+=B.e.gold;S.exp+=B.e.exp;
  const learned=[];let lv=false;
  while(S.exp>=S.lvl*45){
    S.exp-=S.lvl*45;S.lvl++;lv=true;
    S.maxHp+=16;S.maxMp+=10;S.hp=S.maxHp;S.mp=S.maxMp;
    const ns=SKILLS.find(s=>s.lvl===S.lvl);
    if(ns)learned.push(ns.n);
  }
  if(lv){setTimeout(sLvl,500);pop(660,220,'升级!Lv'+S.lvl,'#ffd23f');}
  const wasBoss=B.boss,key=B.key;
  setTimeout(()=>{
    mode='world';B=null;battleUI(false);
    if(key==='snakeKing'){
      flags.mini=true;
      showDialog(['蛇妖王哀鸣一声,化作白雾散去。断桥畅通了!',learned.length?'你领悟了新仙术:'+learned.join('、'):'(已自动保存)']);
    }else if(key==='king'){
      flags.boss=true;
      showEnding();
    }else if(key==='dragon'){
      flags.dragon=true;
      showEnding2();
    }else if(learned.length){
      showDialog(['你领悟了新仙术:'+learned.join('、')+'!']);
    }
    save();
  },1100);
}
function loseB(){
  B.phase='over';refreshBtns();
  setTimeout(()=>{
    mode='world';B=null;battleUI(false);
    S.hp=Math.round(S.maxHp/2);S.mp=S.maxMp;
    switchMap('world',31,44);
    showDialog(['眼前一黑……','再睁眼时,阿萝正守在客栈床边。',{n:'阿萝',t:'别逞强了!多练几级、备好丹药再去。'}]);
  },800);
}
function updBattle(dt){
  if(B.fE>0)B.fE-=dt;if(B.fH>0)B.fH-=dt;if(B.shake>0)B.shake-=dt;
  for(let i=B.pops.length-1;i>=0;i--){B.pops[i].t+=dt;B.pops[i].y-=34*dt;if(B.pops[i].t>1)B.pops.splice(i,1);}
  if(B.anim){
    const a=B.anim;a.t+=dt;
    if(a.k==='lunge'){
      B.hOx=-Math.sin(Math.min(a.t/0.38,1)*Math.PI)*300;
      if(!a.hit&&a.t>=0.18){a.hit=1;dealE(rnd(atkP()-3,atkP()+4));}
      if(a.t>=0.42){B.hOx=0;B.anim=null;afterPlayer();}
    }else if(a.k==='proj'){
      a.x-=1150*dt;
      if(a.x<=330){
        const adv=advMult(a.sk.el,B.e.el);
        const base=atkP()*a.sk.mult;
        const d=Math.max(1,Math.round(rnd(base-4,base+6)*adv));
        dealE(d,ELC[a.sk.el]);
        if(adv>1)pop(310,170,'效果拔群!','#ffd23f');
        else if(adv<1)pop(310,170,'效果不佳…','#9aa3ad');
        B.anim=null;afterPlayer();
      }
    }else if(a.k==='elunge'){
      B.eOx=Math.sin(Math.min(a.t/0.38,1)*Math.PI)*300;
      if(!a.hit&&a.t>=0.18){a.hit=1;hurtHero(rnd(B.e.atk-2,B.e.atk+3));}
      if(a.t>=0.42){
        B.eOx=0;B.anim=null;
        if(S.hp<=0)loseB();else{B.phase='cmd';refreshBtns();}
      }
    }else if(a.k==='espell'){
      if(!a.hit&&a.t>=0.35){a.hit=1;hurtHero(Math.round(rnd(B.e.atk-2,B.e.atk+3)*1.3));}
      if(a.t>=0.7){
        B.anim=null;
        if(S.hp<=0)loseB();else{B.phase='cmd';refreshBtns();}
      }
    }
  }else if(B.phase==='wait'){
    B.timer-=dt;
    if(B.timer<=0)enemyAct();
  }
}
function drawBattle(){
  const towerBg=cur.bg==='tower'||B.key==='king';
  const waterBg=cur.bg==='lake'||cur.bg==='palace'||B.key==='dragon';
  if(waterBg){
    // 水下战场:深蓝水体 + 焦散光柱 + 上浮气泡
    r(0,0,SW,420,'#0f3a48');r(0,420,SW,220,'#0a2a34');
    g.fillStyle='rgba(120,220,230,0.10)';
    [120,360,600,840].forEach((x,i)=>{g.beginPath();g.moveTo(x,0);g.lineTo(x+60,0);g.lineTo(x+120,420);g.lineTo(x+40,420);g.closePath();g.fill();});
    g.fillStyle='rgba(190,240,250,0.5)';
    for(let k=0;k<14;k++){const bx=(k*137+(frame*2))%960,by=420-((frame*3+k*90)%440);g.fillRect(bx,by,3,3);}
    if(B.key==='dragon'){r(360,60,240,360,'#0a2a34');r(450,120,60,120,'#06181e');r(462,132,36,14,'#5dded6');}
  }else if(towerBg){
    r(0,0,SW,420,'#1d1530');r(0,420,SW,220,'#3a2f4a');
    r(80,120,36,300,'#251a3a');r(844,120,36,300,'#251a3a');
    r(90,130,8,280,'#332450');r(854,130,8,280,'#332450');
    if(B.key==='king'){r(340,70,280,350,'#251a3a');r(440,130,80,140,'#120c1e');r(452,142,56,16,'#e24b4a');}
  }else{
    r(0,0,SW,340,'#a8d8ea');
    g.fillStyle='#cfe8f4';g.beginPath();g.arc(820,84,42,0,Math.PI*2);g.fill();
    g.fillStyle='#8fb8a0';
    g.beginPath();g.moveTo(0,340);g.lineTo(220,230);g.lineTo(470,340);g.closePath();g.fill();
    g.beginPath();g.moveTo(380,340);g.lineTo(660,250);g.lineTo(960,340);g.closePath();g.fill();
    r(0,340,SW,300,'#6aa84f');r(0,420,SW,40,'#d9b97f');
  }
  g.save();
  if(B.shake>0)g.translate(rnd(-5,5),rnd(-5,5));
  const m=SPRM[B.e.draw]||{w:20,h:20,s:8};
  const ew=m.w*m.s,eh=m.h*m.s;
  const ex=140+B.eOx,ey=480-eh;
  SPR[B.e.draw](ex,ey,m.s);
  if(B.fE>0){g.globalAlpha=0.7;r(ex,ey,ew,eh,'#ffffff');g.globalAlpha=1;}
  const hs=8,hw=16*hs,hh=20*hs;
  const hx=640+B.hOx,hy=480-hh;
  drawHero(hx,hy,hs,Math.floor(frame/10)%2);
  if(B.fH>0){g.globalAlpha=0.55;r(hx,hy,hw,hh,'#ff3030');g.globalAlpha=1;}
  if(B.anim&&B.anim.k==='proj'){
    const px=B.anim.x,c=ELC[B.anim.sk.el];
    r(px,392,70,10,'#cdd6e0');r(px,394,70,3,'#f0f4f8');
    r(px+66,388,14,18,'#c9a227');
    r(px-12,384,84,4,c);r(px-12,406,84,4,c);
  }
  if(B.anim&&B.anim.k==='espell'){
    const t=B.anim.t,rad=Math.round(t*260),c=ELC[B.e.el];
    g.globalAlpha=Math.max(0,0.8-t);
    g.strokeStyle=c;g.lineWidth=9;

function tone(f,d,type,v,slide){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),ga=AC.createGain();
    o.type=type||'square';o.frequency.setValueAtTime(f,AC.currentTime);
    if(slide)o.frequency.exponentialRampToValueAtTime(slide,AC.currentTime+d);
    ga.gain.setValueAtTime(v||0.05,AC.currentTime);
    ga.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.connect(ga);ga.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}

function updWorld(dt){
  if(!p.mv){
    let dx=0,dy=0;
    if(K.up)dy=-1;else if(K.down)dy=1;else if(K.left)dx=-1;else if(K.right)dx=1;
    if(dx||dy){
      const nx=p.tx+dx,ny=p.ty+dy;
      const n=npcAt(nx,ny),q=n?null:poiAt(nx,ny);
      if(n){K.up=K.down=K.left=K.right=0;n.talk();}
      else if(q){K.up=K.down=K.left=K.right=0;investigate(q);}
      else if(canWalk(nx,ny)){p.mv={fx:p.tx*T,fy:p.ty*T,gx:nx*T,gy:ny*T,t:0};p.tx=nx;p.ty=ny;}
    }
  }else{
    p.mv.t+=dt/0.14;
    if(p.mv.t>=1){p.x=p.mv.gx;p.y=p.mv.gy;p.mv=null;onStep();}
    else{p.x=p.mv.fx+(p.mv.gx-p.mv.fx)*p.mv.t;p.y=p.mv.fy+(p.mv.gy-p.mv.fy)*p.mv.t;}
  }
  for(let i=wpops.length-1;i>=0;i--){wpops[i].t+=dt;wpops[i].y-=24*dt;if(wpops[i].t>1.2)wpops.splice(i,1);}
}
function onStep(){
  const c=tileAt(p.tx,p.ty);
  if(c==='S'&&(S.hp<S.maxHp||S.mp<S.maxMp)){S.hp=S.maxHp;S.mp=S.maxMp;sHeal();wpop('灵泉:全恢复!','#9fe7e0');}
  if(c==='D'&&curName==='world'){
    showDialog(['你推开沉重的石门,塔内阴风扑面……'],()=>switchMap('tower',11,25));
    return;
  }
  if(c==='V'&&flags.ch2){diveLake();return;}
  if(c==='d'||c==='D'||c==='O'){ // 通用传送门:木门、水府门、各类出口
    const door=DOORS[curName+':'+p.tx+','+p.ty];
    if(door){switchMap(door.map,door.x,door.y);return;}
    if(c==='O'){switchMap('world',31,3);return;}
  }
  if(c==='Z'){ // 蛟龙王座
    if(!flags.dragon){
      showDialog([
        '水府深处,一条墨色蛟龙自蟠柱间昂起,鳞甲泛着幽光。',
        {n:'阿萝',t:'师兄小心!这蛟龙性属水,快用风灵咒——御风能破它的水鳞!'},
        {n:'墨蛟龙王',t:'谁人扰我清眠……既来了,便永沉这湖底吧!'}
      ],()=>startBattle('dragon',true));
    }else wpop('王座空荡荡的','#9fe1cb');
    return;
  }
  if(c==='B'){
    if(!flags.boss){
      showDialog([
        '封印法阵的中央,黑雾凝成一道高大的影子。',
        {n:'千年妖王',t:'千年了……终于等到开锁的血食。小辈,纳命来!'}
      ],()=>startBattle('king',true));
    }else wpop('封印安然无恙','#ffd76a');
    return;
  }
  if(curName==='world'&&!flags.mini&&p.ty===14&&(p.tx===31||p.tx===32)){
    showDialog([
      {n:'???',t:'嘶嘶——此桥是我开,要过去,先问问我的毒牙。'},
      '蛇妖王挡住了去路!'
    ],()=>startBattle('snakeKing',true));
    return;
  }
  if(c==='t'||c==='e'||c==='c'){ // 深草 / 符纹地 / 水草:遇敌地形
    if(grace>0){grace--;return;}
    if(Math.random()<cur.rate){
      const pool=cur.pool();
      startBattle(pool[rnd(0,pool.length-1)],false);
    }
  }
}
// 第二章:纵身潜入水月湖底(首次潜入播一段旁白)
function diveLake(){
  if(!flags.lakeIntro){
    flags.lakeIntro=true;
    showDialog([
      '你深吸一口气,纵身跃入漩涡。冰凉的湖水将你裹住,世界沉入一片幽蓝。',
      {n:'阿萝',t:'师兄,我跟你一起!这水府机关重重,千万跟紧我。'},
      '(水草丛中会遇上水妖;气泡灵泉可回满状态。北边的水府门后,便是蛟龙的巢穴。)'
    ],()=>switchMap('lake',14,21));
  }else switchMap('lake',14,21);
}

// Phase 1:翻找家具。首次有宝物("叮"+金色飘字),重复调查按种类给不同文案
function investigate(q){
  const kd=POI_KINDS[q.kind];
  if(looted[q.id]){showDialog([kd.again]);return;}
  looted[q.id]=true;
  const lt=q.loot,lines=[];
  if(lt.t==='gold'){S.gold+=lt.n;sDing();wpop('+'+lt.n+' 两','#ffd76a');lines.push('你在'+kd.n+'里翻出了 '+lt.n+' 两银子!');}
  else if(lt.t==='item'){const n=lt.n||1;INV[lt.k]+=n;sDing();wpop(ITEMN[lt.k]+' ×'+n,'#ffd76a');lines.push('你在'+kd.n+'里找到了'+ITEMN[lt.k]+'!');}
  else if(lt.t==='note'){sDing();wpop('发现纸条','#ffd76a');lines.push('你在'+kd.n+'里发现一张纸条……',lt.text);}
  else lines.push('你仔细翻了翻'+kd.n+'……什么都没有。');
  // 翻到第二件时,屋主忍不住吐槽一句(每间屋一次)
  const sn=SNARK[curName];
  if(sn&&(POIS[curName]||[]).filter(x=>looted[x.id]).length===2)lines.push(sn);
  showDialog(lines);
  save();
}

function talkAluo(){
  if(!flags.aluo){
    flags.aluo=true;INV.dan++;
    showDialog([
      {n:'阿萝',t:'师兄!锁妖塔的封印快破了,北边过了断桥就是塔门。'},
      {n:'阿萝',t:'这枚回灵丹你带上。桥上盘着一条蛇妖王,千万小心!'},
      {n:'阿萝',t:'湖东边有灵泉能回满状态,杂货铺和铁匠铺也去看看。'}
    ]);
  }
  else if(!flags.mini)showDialog([{n:'阿萝',t:'先在草丛练级、买好装备,再去会那蛇妖王!它属水,雷法可不好使。'}]);
  else if(!flags.boss)showDialog([{n:'阿萝',t:'塔里阴气重,鬼火属火——练到 5 级学会水灵咒就能克它,妖王也一样!'}]);
  else if(!flags.ch2){ // 第二章开篇:妖王残魂惊动湖底蛟龙,阿萝传授风灵咒,湖面漩涡显现
    flags.ch2=true;flags.wind=true;
    showDialog([
      {n:'阿萝',t:'师兄,大事不好!妖王临死那缕妖魂沉进了水月湖,惊醒了湖底沉睡千年的蛟龙!'},
      {n:'阿萝',t:'湖水一夜暴涨,村子要保不住了……这回,我陪你一起下湖!'},
      {n:'阿萝',t:'湖底水妖个个属水。我把师门的「风灵咒」传给你——风能克水,正好破它们!'},
      '【习得仙术 · 风灵咒】(战斗中选「仙术」即可施放)',
      {n:'阿萝',t:'湖中央起了个漩涡,那就是入口。走,我在漩涡边等你!'}
    ]);
    save();
  }
  else if(!flags.dragon)showDialog([{n:'阿萝',t:'湖中漩涡通往水府。记住——水府里的妖物都属水,风灵咒打它们最疼!'}]);
  else showDialog([{n:'阿萝',t:'蛟龙也降了,师兄真是顶天立地的大英雄!下一程,我还要跟着你。'}]);
}
// 第二章:阿萝在湖底剧情同行(随进度变化的台词)
function talkAluoLake(){
  if(!flags.dragon)showDialog([
    {n:'阿萝',t:'顺着水草往北走就是水府门。当心,墨鱼妖最快,先用风灵咒点它!'},
    {n:'阿萝',t:'那只龟将军壳硬属土——对它改用雷灵咒,事半功倍。'}
  ]);
  else showDialog([{n:'阿萝',t:'湖水退下去了,水府也安静了。师兄,我们回村报喜吧!'}]);
}
function inn(){
  const c=Math.min(10,S.gold);S.gold-=c;S.hp=S.maxHp;S.mp=S.maxMp;sHeal();save();
  showDialog([{n:'老板娘',t:'热水烧好啦,好生歇息。(花费 '+c+' 两,气血灵力全满,已自动保存)'}]);
}

let dq=[],dcb=null;
function showDialog(lines,cb){dq=lines.slice();dcb=cb;$('dlg').style.display='block';nextDlg();}
function nextDlg(){
  if(!dq.length){
    $('dlg').style.display='none';
    const c=dcb;dcb=null;if(c)c();
    return;
  }
  const it=dq.shift();
  if(typeof it==='string'){$('dlgName').style.display='none';$('dlgText').textContent=it;}
  else{$('dlgName').style.display='inline-block';$('dlgName').textContent=it.n;$('dlgText').textContent=it.t;}
}
function openPanel(html){$('panelBody').innerHTML=html;$('panel').style.display='flex';}
function closePanel(){$('panel').style.display='none';}
let toastT=null;
function toast(t){
  $('toast').textContent=t;$('toast').style.display='block';
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>{$('toast').style.display='none';},1400);
}
function shopRow(n,d,pr,fn){
  return '<div class="srow"><div><b>'+n+'</b><span>'+d+'</span></div><button class="pbtn" onclick="'+fn+'">'+pr+' 两</button></div>';
}
function openShop(kind){
  let h='<h3>'+(kind==='item'?'杂货铺':'铁匠铺')+'</h3><div class="gold">银两:'+S.gold+'</div>';
  if(kind==='item'){
    h+=shopRow('回灵丹','恢复 45 气血(现有 '+INV.dan+')',30,"buyItem('dan',30)");
    h+=shopRow('清心散','恢复 30 灵力(现有 '+INV.qing+')',30,"buyItem('qing',30)");
    h+=shopRow('大还丹','气血全满(现有 '+INV.dadan+')',90,"buyItem('dadan',90)");
  }else{
    for(let i=1;i<WPNS.length;i++)h+=shopRow(WPNS[i].n,'攻击 +'+WPNS[i].a+(EQ.wpn===i?' · 已装备':EQ.wpn>i?' · 已淘汰':''),WPNS[i].p,'buyWpn('+i+')');
    for(let i=1;i<ARMS.length;i++)h+=shopRow(ARMS[i].n,'防御 +'+ARMS[i].d+(EQ.arm===i?' · 已装备':EQ.arm>i?' · 已淘汰':''),ARMS[i].p,'buyArm('+i+')');
  }
  h+='<button class="pbtn" onclick="closePanel()">离开</button>';
  openPanel(h);
}
function buyItem(k,pr){
  if(S.gold<pr){toast('银两不够……');return;}
  S.gold-=pr;INV[k]++;sHeal();openShop('item');
}
function buyWpn(i){
  if(EQ.wpn>=i){toast('已有更好的剑了');return;}
  if(S.gold<WPNS[i].p){toast('银两不够……');return;}
  S.gold-=WPNS[i].p;EQ.wpn=i;sLvl();toast('已装备 '+WPNS[i].n);openShop('gear');
}
function buyArm(i){
  if(EQ.arm>=i){toast('已有更好的护甲了');return;}
  if(S.gold<ARMS[i].p){toast('银两不够……');return;}
  S.gold-=ARMS[i].p;EQ.arm=i;sLvl();toast('已装备 '+ARMS[i].n);openShop('gear');
}
function openStatus(){
  const known=SKILLS.filter(skillKnown).map(s=>s.n+'·'+s.el).join('  ');
  openPanel('<h3>云无衣</h3>'+
    '<div class="srow"><div><b>等级 '+S.lvl+'</b><span>经验 '+S.exp+' / '+(S.lvl*45)+'</span></div></div>'+
    '<div class="srow"><div><b>气血 '+S.hp+'/'+S.maxHp+'</b><span>灵力 '+S.mp+'/'+S.maxMp+'</span></div></div>'+
    '<div class="srow"><div><b>攻击 '+atkP()+' · 防御 '+defP()+'</b><span>'+WPNS[EQ.wpn].n+' / '+ARMS[EQ.arm].n+'</span></div></div>'+
    '<div class="srow"><div><b>仙术</b><span>'+known+'</span></div></div>'+
    '<div class="srow"><div><b>行囊</b><span>回灵丹×'+INV.dan+'  大还丹×'+INV.dadan+'  清心散×'+INV.qing+'  银两 '+S.gold+'</span></div></div>'+
    '<button class="pbtn" onclick="doSave()">保存进度</button> <button class="pbtn" onclick="closePanel()">关闭</button>');
}
function doSave(){save();toast('已保存');closePanel();}
function save(){
  try{localStorage.setItem('lingshan1',JSON.stringify({S:S,INV:INV,EQ:EQ,flags:flags,looted:looted,map:curName,x:p.tx,y:p.ty}));}catch(e){}
}
function loadSave(){
  try{
    const d=JSON.parse(localStorage.getItem('lingshan1'));
    if(!d)return false;
    Object.assign(S,d.S);Object.assign(INV,d.INV);Object.assign(EQ,d.EQ);Object.assign(flags,d.flags);
    for(const k in looted)delete looted[k];
    Object.assign(looted,d.looted||{});
    switchMap(d.map||'world',d.x,d.y);
    return true;
  }catch(e){return false;}
}
function hasSave(){try{return !!localStorage.getItem('lingshan1');}catch(e){return false;}}
function resetState(){
  Object.assign(S,{hp:70,maxHp:70,mp:36,maxMp:36,lvl:1,exp:0,gold:80});
  Object.assign(INV,{dan:3,dadan:0,qing:1});
  EQ.wpn=0;EQ.arm=0;
  flags.aluo=false;flags.mini=false;flags.boss=false;
  flags.ch2=false;flags.wind=false;flags.lakeIntro=false;flags.dragon=false;
  for(const k in looted)delete looted[k];
  switchMap('world',31,44);
}

function showEnding(){
  if($('endTitle'))$('endTitle').textContent='第一章 · 完';
  $('endText').textContent='千年妖王哀嚎着被吸回封印,法阵重新亮起金光。阿萝在塔外迎着晨光向你奔来——回到村里找她,水月湖那边,似乎又起了波澜……';
  $('endov').style.display='flex';
  sWin();
}
function showEnding2(){
  if($('endTitle'))$('endTitle').textContent='第二章 · 完';
  $('endText').textContent='墨蛟龙王化作一池清水,湖面重归平静,月影粼粼。阿萝挽住你的衣袖,笑着说还要陪你走更远的路——灵山的传说,仍未完待续。想要第三章?回到 Claude 的对话里喊一声就行。';
  $('endov').style.display='flex';
  sWin();
}
$('btnRoam').onclick=()=>{$('endov').style.display='none';};
$('btnRestart').onclick=()=>{$('endov').style.display='none';resetState();save();};

const petals=[];
for(let i=0;i<26;i++)petals.push({x:Math.random()*SW,y:Math.random()*SH,vx:24+Math.random()*36,vy:30+Math.random()*42,s:4+Math.round(Math.random()*2)});
function drawTitleBg(dt){
  r(0,0,SW,SH,'#181426');
  g.fillStyle='#f3e6c8';g.beginPath();g.arc(780,124,60,0,Math.PI*2);g.fill();
  g.fillStyle='#181426';g.beginPath();g.arc(804,108,52,0,Math.PI*2);g.fill();
  g.fillStyle='#241d38';
  g.beginPath();g.moveTo(0,500);g.lineTo(180,280);g.lineTo(400,500);g.closePath();g.fill();
  g.beginPath();g.moveTo(260,520);g.lineTo(520,240);g.lineTo(800,520);g.closePath();g.fill();
  g.fillStyle='#2e2547';
  g.beginPath();g.moveTo(600,540);g.lineTo(840,320);g.lineTo(960,540);g.closePath();g.fill();
  r(0,500,SW,140,'#100d1c');
  r(456,300,48,200,'#0c0a16');r(444,288,72,16,'#0c0a16');r(464,240,32,60,'#0c0a16');r(470,226,20,16,'#0c0a16');
  for(const f of petals){
    f.x-=f.vx*dt;f.y+=f.vy*dt;
    if(f.y>SH||f.x<-6){f.x=SW+Math.random()*60;f.y=-12;}
    r(f.x,f.y,f.s,f.s,'#ED93B1');
  }
}
document.querySelectorAll('#dpad button').forEach(b=>{
  const d=b.dataset.d;
  if(!d)return;
  b.addEventListener('pointerdown',e=>{e.preventDefault();au();K[d]=1;try{b.setPointerCapture(e.pointerId);}catch(err){}});
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>b.addEventListener(ev,()=>{K[d]=0;}));
});
const KM={ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'};
window.addEventListener('keydown',e=>{
  au();
  if(KM[e.key]!==undefined){K[KM[e.key]]=1;e.preventDefault();}
  if((e.key==='Enter'||e.key===' '||e.key==='z')&&$('dlg').style.display==='block'){nextDlg();e.preventDefault();}
});
window.addEventListener('keyup',e=>{if(KM[e.key]!==undefined)K[KM[e.key]]=0;});
$('dlg').onclick=()=>{au();nextDlg();};
$('batk').onclick=()=>act('atk');
$('bskl').onclick=()=>act('skl');
$('bitm').onclick=()=>act('itm');
$('bfle').onclick=()=>act('fle');
$('btnBag').onclick=()=>{au();if(mode==='world')openStatus();};
$('btnMus').onclick=()=>{au();setMusic(!musicOn);};
$('btnNew').onclick=()=>{
  au();resetState();
  $('title').style.display='none';mode='world';
  showDialog([
    '第一章 · 锁妖塔',
    {n:'阿萝',t:'师兄!出大事了,快来村口找我!'},
    '(撞上村民即可对话;先去找阿萝吧)'
  ]);
};
$('btnCont').onclick=()=>{
  au();
  if(loadSave()){$('title').style.display='none';mode='world';}
  else toast('没有找到存档');
};
if(!hasSave())$('btnCont').disabled=true;
battleUI(false);

let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000);
  last=now;frame++;
  if(mode==='title')drawTitleBg(dt);
  else if(mode==='world'){
    if($('dlg').style.display!=='block'&&$('panel').style.display!=='flex'&&$('endov').style.display!=='flex')updWorld(dt);
    drawWorld();
  }
  else if(mode==='battle'&&B){updBattle(dt);drawBattle();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
