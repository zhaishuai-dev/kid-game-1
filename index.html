<title>灵山剑侠录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  /* 输入框(起名/密码)仍允许选中编辑 */
  input { -webkit-user-select: text; user-select: text; }
  body { background: #14121c; color: #e8e2d5; font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
         display: flex; flex-direction: column; align-items: center; min-height: 100vh;
         /* 全屏到主屏后,避开刘海/状态栏/底部小白条 */
         padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
                  max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left)); }
  #wrap { position: relative; width: min(960px, 100%); }
  canvas { width: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges;
           border: 2px solid #3a3148; border-radius: 6px; background: #0d0b14; touch-action: none; }
  .ovl { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
         justify-content: center; gap: 14px; }
  #title { background: rgba(13,11,20,0.35); border-radius: 6px; }
  #title h1 { font-family: "KaiTi", "STKaiti", "DFKai-SB", serif; font-size: clamp(40px, 9vw, 76px);
              color: #f3e6c8; letter-spacing: 0.18em; text-shadow: 0 3px 0 #5a2c1d, 0 0 24px rgba(255,210,106,0.35); }
  #title .sub { font-size: 14px; color: #c9b98f; letter-spacing: 0.5em; margin-top: -6px; }
  .gbtn { font-family: inherit; font-size: 16px; padding: 10px 34px; cursor: pointer;
          background: #241e33; color: #f3e6c8; border: 1px solid #8a6d3b; border-radius: 4px; letter-spacing: 0.3em; }
  .gbtn:hover { background: #322a47; }
  .gbtn:disabled { opacity: 0.4; cursor: default; }
  #dlg { position: absolute; left: 3%; right: 3%; bottom: 4%; background: rgba(16,13,26,0.92);
         border: 1px solid #8a6d3b; border-radius: 6px; padding: 12px 16px; cursor: pointer;
         font-size: clamp(14px, 2.4vw, 17px); line-height: 1.7; display: none; }
  #dlgName { display: none; background: #8a6d3b; color: #16121f; font-size: 12px; padding: 1px 10px;
             border-radius: 3px; margin-right: 8px; vertical-align: 2px; }
  #dlg .cue { color: #8d8470; font-size: 12px; float: right; margin-top: 6px; }
  #panel { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
           background: rgba(8,6,12,0.55); }
  #panelBody { background: #1c1729; border: 1px solid #8a6d3b; border-radius: 8px; padding: 18px 20px;
               width: min(420px, 92%); max-height: 88%; overflow-y: auto; }
  #panelBody h3 { font-family: "KaiTi", "STKaiti", serif; color: #ffd76a; font-size: 20px; margin-bottom: 10px; letter-spacing: 0.2em; }
  #panelBody .gold { color: #c9b98f; font-size: 13px; margin-bottom: 10px; }
  .srow { display: flex; justify-content: space-between; align-items: center; gap: 10px;
          border-bottom: 1px solid #322a47; padding: 9px 2px; font-size: 14px; }
  .srow span { display: block; color: #9a917e; font-size: 12px; margin-top: 2px; }
  .pbtn { font-family: inherit; font-size: 13px; padding: 7px 14px; cursor: pointer; white-space: nowrap;
          background: #241e33; color: #f3e6c8; border: 1px solid #8a6d3b; border-radius: 4px; margin-top: 8px; }
  .pbtn:hover { background: #322a47; }
  #panelBody input { font-family: inherit; font-size: 16px; padding: 10px 12px; width: 100%; margin: 8px 0;
          background: #120f1c; color: #f3e6c8; border: 1px solid #8a6d3b; border-radius: 4px; letter-spacing: 0.15em; }
  #who { color: #c9b98f; font-size: 15px; letter-spacing: 0.3em; margin-top: 4px; }
  #profSlots { display: flex; flex-direction: column; gap: 10px; width: min(360px, 86%); }
  .pslot { display: flex; align-items: stretch; background: rgba(20,16,30,0.78); border: 2px solid #8a6d3b;
           border-radius: 10px; overflow: hidden; }
  .pslot-go { flex: 1; display: flex; align-items: center; gap: 12px; background: transparent; border: 0;
           cursor: pointer; padding: 10px 12px; color: #f3e6c8; font-family: inherit; text-align: left; }
  .pav { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
         font-size: 26px; flex: none; }
  .pinfo { display: flex; flex-direction: column; }
  .pinfo b { font-size: 18px; letter-spacing: 0.05em; }
  .pinfo span { color: #9a917e; font-size: 12px; margin-top: 2px; }
  .pslot-edit { background: transparent; border: 0; border-left: 1px solid #3a3148; color: #c9b98f;
           font-size: 18px; padding: 0 14px; cursor: pointer; }
  .pslot-go:active, .pslot-edit:active { background: rgba(255,255,255,0.06); }
  #toast { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); background: rgba(16,13,26,0.92);
           border: 1px solid #8a6d3b; border-radius: 4px; padding: 6px 18px; font-size: 14px; display: none; }
  #endov { background: rgba(10,8,16,0.88); display: none; text-align: center; padding: 20px; }
  #endov h2 { font-family: "KaiTi", "STKaiti", serif; font-size: clamp(28px, 6vw, 48px); color: #ffd76a; letter-spacing: 0.2em; }
  #endov p { color: #c9b98f; font-size: 15px; line-height: 1.9; max-width: 480px; }
  #ctl { display: flex; width: min(960px, 100%); justify-content: space-between; align-items: center;
         margin-top: 10px; gap: 10px; flex-wrap: wrap; }
  #dpad { display: grid; grid-template-columns: repeat(3, 54px); grid-template-rows: repeat(2, 46px); gap: 5px; }
  #dpad button, #btl button { font-family: inherit; font-size: 15px; cursor: pointer; background: #241e33;
         color: #f3e6c8; border: 1px solid #574a73; border-radius: 6px; }
  #dpad button:active, #btl button:active { background: #3d3357; }
  #btl { display: none; gap: 8px; flex: 1; flex-wrap: wrap; }
  #btl button { flex: 1; min-width: 76px; padding: 12px 6px; border-color: #8a6d3b; }
  #btl button:disabled { opacity: 0.4; }
  #menubar { display: flex; gap: 8px; }
  #menubar button { font-family: inherit; font-size: 13px; padding: 10px 14px; cursor: pointer;
         background: #1c1729; color: #c9b98f; border: 1px solid #574a73; border-radius: 6px; }
  #hint { width: min(960px, 100%); color: #6e6655; font-size: 12px; margin-top: 10px; line-height: 1.8; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="960" height="640"></canvas>
  <div id="title" class="ovl">
    <h1>灵山剑侠录</h1>
    <div class="sub">五灵 · 全五章</div>
    <div id="who">谁在玩呢?</div>
    <div id="profSlots"></div>
  </div>
  <div id="dlg"><span id="dlgName"></span><span id="dlgText"></span><span class="cue">▾ 点击 / 回车</span></div>
  <div id="panel"><div id="panelBody"></div></div>
  <div id="endov" class="ovl">
    <h2 id="endTitle">第一章 · 完</h2>
    <p id="endText"></p>
    <div style="display:flex;gap:12px;">
      <button id="btnRoam" class="gbtn">继续游历</button>
      <button id="btnRestart" class="gbtn">重新开始</button>
    </div>
  </div>
  <div id="toast"></div>
</div>
<div id="ctl">
  <div id="dpad">
    <span></span><button data-d="up" aria-label="上">▲</button><span></span>
    <button data-d="left" aria-label="左">◀</button><button data-d="down" aria-label="下">▼</button><button data-d="right" aria-label="右">▶</button>
  </div>
  <div id="btl">
    <button id="batk">⚔️ 攻击</button>
    <button id="bskl">✨ 仙术</button>
    <button id="bitm">🎒 物品</button>
    <button id="bfle">🏃 逃跑</button>
  </div>
  <div id="menubar">
    <button id="btnBag">🎒 背包</button>
    <button id="btnStat">⭐ 状态</button>
    <button id="btnSave">💾 保存</button>
    <button id="btnMus">🎵 关</button>
  </div>
</div>
<div id="hint">👶 小朋友:手指点屏幕走路、点对话框翻页,⚔️打怪、❤️回血 · 电脑:方向键 / WASD 移动,回车推进对话 · 撞上村民即对话 · 村里的屋子都能进,撞一撞柜子水缸说不定有宝贝 · 深色草丛会遇敌 · 五灵相克:💧水克🔥火、🔥火克⚡雷、⚡雷克🪨土、🪨土克🍃风、🍃风克💧水</div>
<script src="src/data.js"></script>
<script src="src/sprites.js"></script>
<script src="src/maps.js"></script>
<script src="src/battle.js"></script>
<script src="src/engine.js"></script>
</body>
</html>
